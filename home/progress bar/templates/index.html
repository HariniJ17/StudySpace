<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-learning Platform</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>E-learning Platform</h1>
<div class="progress-container">
    <progress id="progressBar" value="0" max="100"></progress>
    <p id="progressText">0% Completed</p>
</div>

<div class="video-container">
    <h3>Video 1</h3>
    <video id="video1" width="600" controls onended="markAsWatched(1)">
        <source src="{{ url_for('static', filename='video1.mp4') }}" type="video/mp4">
    </video>
    <button onclick="takeQuiz(1)">Take Quiz</button>
</div>

<div class="video-container">
    <h3>Video 2</h3>
    <video id="video2" width="600" controls onended="markAsWatched(2)">
        <source src="{{ url_for('static', filename='video2.mp4') }}" type="video/mp4">
    </video>
    <button onclick="takeQuiz(2)">Take Quiz</button>
</div>

<button onclick="downloadCertificate()">Download Certificate</button>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
