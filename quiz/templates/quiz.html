<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Section</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="quiz-container">
    <h2>Quiz: JavaScript Basics</h2>

    <form action="/submit" method="POST">
      <label for="user_name">Enter your name:</label>
      <input type="text" id="user_name" name="user_name" required><br><br>

      <div class="question">
        <p>1. What does HTML stand for?</p>
        <label><input type="radio" name="q1" value="a"> Hyper Text Markup Language</label><br>
        <label><input type="radio" name="q1" value="b"> Home Tool Markup Language</label><br>
        <label><input type="radio" name="q1" value="c"> Hyperlinks and Text Markup Language</label><br>
      </div>

      <div class="question">
        <p>2. Who is making the Web standards?</p>
        <label><input type="radio" name="q2" value="a"> Microsoft</label><br>
        <label><input type="radio" name="q2" value="b"> Mozilla</label><br>
        <label><input type="radio" name="q2" value="c"> The World Wide Web Consortium</label><br>
      </div>

      <div class="question">
        <p>3. Which tag is used to define an internal style sheet in HTML?</p>
        <label><input type="radio" name="q3" value="a"> &lt;style&gt;</label><br>
        <label><input type="radio" name="q3" value="b"> &lt;script&gt;</label><br>
        <label><input type="radio" name="q3" value="c"> &lt;css&gt;</label><br>
      </div>

      <button type="submit">Submit Quiz</button>
    </form>
  </div>
</body>
</html>
