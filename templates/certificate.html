<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate of Completion</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Great+Vibes&display=swap');
        body {
            text-align: center;
            background-color: #f9f9f9;
            font-family: 'Arial', sans-serif;
        }
        #certificate {
            width: 80%;
            margin: 20px auto;
            padding: 40px;
            text-align: center;
            background-color: white;
            position: relative;
            display: block;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.2);
            border: 10px solid #831238;
            font-family: 'Playfair Display', serif;
        }
        h2 {
            font-size: 40px;
            color: #831238;
        }
        h3, h4 {
            font-size: 24px;
        }
        .name {
            font-size: 40px;
            font-family: 'Great Vibes', cursive;
            color: #831238;
        }
        button {
            padding: 10px 20px;
            background-color: #831238;
            color: white;
            border: none;
            cursor: pointer;
            margin: 10px;
            font-size: 16px;
            border-radius: 5px;
        }
        button:hover {
            background-color: rgb(148, 41, 77);
        }
    </style>
</head>
<body>
    <h1>Certificate of Completion</h1>
    <button id="downloadBtn">Download Certificate</button>

    <div id="certificate">
        <h2>CERTIFICATE OF COMPLETION</h2>
        <p>Presented to</p>
        <h3 class="name">{{ username }}</h3>
        <p>For successfully completing the online course on</p>
        <h4>{{ course_name }}</h4>
        <p>Completion Date: {{ completion_date }}</p>
        <p>Provided by <strong>Study Space</strong></p>
    </div>

    <script>
        document.getElementById('downloadBtn').addEventListener('click', () => {
            html2canvas(document.getElementById('certificate'), {
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'certificate.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>
</html>
