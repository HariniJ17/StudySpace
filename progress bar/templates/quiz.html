<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <!-- boostrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .quiz-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            text-align: center;
        }

        .question {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: rgba(131, 18, 56, 1);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: rgb(154, 40, 78);
        }


        #result {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
 /* navbar */
 .navbar {
    position: fixed;
    width: 100%;
    top: 0;
    left: 0;
    background: rgba(113, 0, 38, 0.432);
    /* Semi-transparent with blur effect */
    backdrop-filter: blur(10px);
    padding: 5px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
    transition: background 0.3s ease-in-out;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.navbar:hover {
    background: rgba(131, 18, 56, 0.9);
    /* Darker on hover */
}

.navbar-brand {
    font-family: "Jersey 15", serif;
    font-size: 3rem;
    font-weight: lighter;
    color: white;
    /* Default color */
    transition: color 0.3s ease, transform 0.3s ease, opacity 0.3s ease;
    /* Smooth transition */
    opacity: 1;
    /* Default opacity */
}

.navbar-brand:hover {
    color: #fdfdfd;
    /* Hover color */
    transform: scale(1.1);
    /* Slight zoom effect */
    opacity: 0.8;
    /* Slightly fade effect */
    text-decoration: none;
}

.navbar-nav .nav-item {
    margin-left: 20px;
    font-size: 1.5rem;
    margin: 0 15px;
    transition: #ffffff 0.3s ease, transform 0.3s ease, opacity 0.3s ease;
    opacity: 1;
}

.navbar-nav .nav-link {
    transition: #831238 0.3s ease;
    color: #ffffff;
    font-weight: 500;
    font-size: 20px;
}

.navbar-nav .nav-link:hover {
    color: #ffffff;
    /* Hover color */
    transform: scale(1.1);
    /* Slight zoom effect */
    opacity: 0.8;
    /* Slightly fade effect */
    text-decoration: none;
}

/* Responsive Navbar */
.navbar-toggler {
    border: none;
    background: none;
}

.navbar-toggler-icon {
    filter: invert(1);
    /* Makes the toggler icon white */
}

    </style>
</head>

<body>
    <!-- navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand">Study Space</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="./course.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="./contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="./game.html">MindZone</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
                </ul>
            </div>
        </div>
    </nav>
   
    <div class="quiz-container">
        <h2>Quiz: Python Basics</h2>
        <form id="quizForm">
            <div class="question">
                <p>1. What is the correct file extension for Python files?</p>
                <label>
                    <input type="radio" name="q1" value="a"> .py
                </label>
                <label>
                    <input type="radio" name="q1" value="b"> .python
                </label>
                <label>
                    <input type="radio" name="q1" value="c"> .pty
                </label>
            </div>

            <div class="question">
                <p>2. How do you create a variable in Python?</p>
                <label>
                    <input type="radio" name="q2" value="a"> var x = 10
                </label>
                <label>
                    <input type="radio" name="q2" value="b">
                    x = 10 </label>
                <label>
                    <input type="radio" name="q2" value="c"> 9x = 10
                </label>
            </div>

            <div class="question">
                <p>3. Which keyword is used to define a function in Python?</p>
                <label>
                    <input type="radio" name="q3" value="a"> def
                </label>
                <label>
                    <input type="radio" name="q3" value="b"> function
                </label>
                <label>
                    <input type="radio" name="q3" value="c"> fun
                </label>
            </div>

            <button type="button" onclick="checkAnswers()">Submit</button>
        </form>

        <div id="result"></div>
        <a href="{{ url_for('certificate') }}" class="button"><button>Download Certificate</button></a>
    </div>

    <script>
        function checkAnswers() {
            const quizForm = document.getElementById("quizForm");
            let score = 0;

            // Answer Key
            const answers = {
                q1: "a", // Correct answer for question 1
                q2: "b", // Correct answer for question 2
                q3: "a", // Correct answer for question 3
            };

            // Check answers
            for (let i = 1; i <= 3; i++) {
                const question = `q${i}`; // Correctly format the question key
                const selectedAnswer = quizForm.querySelecteor(`input[name="${question}"]:checked`); // Fix querySelector syntax

                if (selectedAnswer && selectedAnswer.value === answers[question]) {
                    score++;
                }
            }

            // Display result
            const result = document.getElementById("result");
            result.textContent = `You scored ${score} out of 3`;

            // Enable certificate button only if all answers are completed
            const allAnswered = Object.keys(answers).every(question => {
                return quizForm.querySelector(`input[name="${question}"]:checked`);
            });

            if (allAnswered) {
                document.getElementById("certificateButton").disabled = false;
            } else {
                alert("Please answer all questions before getting the certificate.");
            }
        }
    </script>
     <!-- boostrap -->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
     integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"

</body>

</html>
