<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Page</title>
</head>
<body>
    

    <h2>Course Title</h2>

    <!-- Video Player -->
    <video width="600" controls>
        <source src="{{ url_for('static', filename='videos/sample.mp4') }}" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <h3>Your Notes</h3>

    <!-- Notes Form -->
    <form action="/save_note" method="POST">
        <textarea name="note" rows="5" cols="60" placeholder="Write your notes here..."></textarea>
        <input type="hidden" name="course_id" value="1"> <!-- Replace with dynamic course ID -->
        <button type="submit">Save Note</button>
    </form>

    <h3>Previous Notes</h3>
    <ul>
        {% for note in notes %}
            <li>{{ note[0] }} ({{ note[1] }})</li> <!-- Show note and timestamp -->
        {% endfor %}
    </ul>
   
    

</body>
</html>
