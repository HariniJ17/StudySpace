<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Space</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inknut Antiqua', serif;
            background: #fff;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(131, 18, 56, 1);
            padding: 20px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 40px;
            color: white;
            font-weight: 400;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: white;
            font-size: 20px;
            text-decoration: none;
        }

        .hero {
            text-align: center;
            padding: 50px;
        }

        .explore-btn {
            display: inline-block;
            background: rgba(131, 18, 56, 1);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 20px;
            margin-top: 20px;
            text-decoration: none;
        }

        .content-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            padding: 50px;
        }

        .content-box {
            background: rgba(178, 126, 143, 1);
            padding: 30px;
            border-radius: 20px;
            max-width: 600px;
            text-align: center;
        }

        .content-box p {
            font-size: 18px;
            color: black;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .nav-links {
                flex-direction: column;
                text-align: center;
            }

            .hero {
                padding: 30px;
            }

            .explore-btn {
                font-size: 18px;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">StudySpace</div>
        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Courses</a>
            <a href="#">MindZone</a>
            <a href="#">Profile</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Welcome to Study Space</h1>
        <a href="#" class="explore-btn">EXPLORE COURSES</a>
    </section>

    <section class="content-container">
        <div class="content-box">
            <p>Study Space revolutionizes education by merging top-notch content with a user-friendly interface, offering diverse courses that empower students to learn at their own pace.</p>
        </div>
    </section>
</body>
</html>
